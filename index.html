<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Streaming Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/icon-512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --card-bg: rgba(255, 255, 255, 0.06); }
        
        body {
            margin: 0;
            background: #0a0a12;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .main-player {
            background: linear-gradient(145deg, #1e1e2f, #11111d);
            padding: 1.5rem;
            border-radius: 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            position: relative;
        }

        .signature {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.65rem;
            font-style: italic;
            opacity: 0.3;
            color: white;
            transform: rotate(-5deg);
            pointer-events: none;
            letter-spacing: 1px;
        }

        .logo-main {
            width: 100px; height: 100px;
            margin: 0 auto 10px;
            background: #ffffff;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            border: 3px solid transparent;
            transition: all 0.5s ease;
        }
        .logo-main img { max-width: 85%; max-height: 85%; object-fit: contain; }

        @keyframes pulse-border {
            0% { border-color: rgba(0, 210, 255, 0.2); box-shadow: 0 0 5px rgba(0, 210, 255, 0.2); }
            50% { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); }
            100% { border-color: rgba(0, 210, 255, 0.2); box-shadow: 0 0 5px rgba(0, 210, 255, 0.2); }
        }

        .playing-animation { animation: pulse-border 2s infinite ease-in-out; }

        .status-container {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-bottom: 5px;
            font-size: 0.7rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; }
        .status-online { color: #00ff88; }
        .status-online .status-dot { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-offline { color: #ff4444; }
        .status-offline .status-dot { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        #now-playing {
            font-size: 0.85rem;
            color: var(--accent);
            margin: 5px 0 15px 0;
            min-height: 1.2em;
            font-weight: 500;
            font-style: italic;
        }

        .scroll-container {
            width: 100%; max-width: 380px;
            display: flex; flex-direction: column; gap: 15px;
            flex-grow: 1; overflow-y: hidden; padding-bottom: 10px;
        }

        .list-frame {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto;
            /* ASCUNDE BARA DE SCROLL */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE și Edge */
        }

        /* ASCUNDE BARA DE SCROLL pentru Chrome, Safari, Opera */
        .list-frame::-webkit-scrollbar {
            display: none;
        }

        #favorites-frame { max-height: 160px; flex-shrink: 0; }
        #all-stations-frame { flex-grow: 1; max-height: 100%; }

        .radio-item {
            background: var(--card-bg); padding: 10px 15px;
            border-radius: 15px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; margin-bottom: 8px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .radio-item.active { border-left: 4px solid var(--accent); background: rgba(0,210,255,0.1); }
        .radio-item img { width: 40px; height: 40px; border-radius: 8px; background: white; object-fit: contain; }
        .radio-item .info { flex-grow: 1; font-size: 0.9rem; }
        .fav-star { color: rgba(255,255,255,0.2); padding: 8px; font-size: 1.1rem; }
        .fav-star.active { color: #ffcc00; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .play-btn { font-size: 3rem; cursor: pointer; }
        .nav-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.6; }

        .timer-opt {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="main-player">
        <div class="signature">@kraussioachim</div>

        <div id="logo-container" class="logo-main">
            <img id="current-logo" src="img/logo_radiomplus.webp" alt="Logo">
        </div>

        <div id="radio-status-box" class="status-container">
            <div class="status-dot"></div>
            <span id="status-text">Selectați Radio</span>
        </div>

        <h4 id="current-title" style="margin: 5px 0 2px 0;">Radio Streaming</h4>
        <div id="now-playing">Audio Online</div>
        
        <div class="controls">
            <i class="fas fa-step-backward nav-btn" id="prevBtn"></i>
            <i class="fas fa-play-circle play-btn" id="masterPlay"></i>
            <i class="fas fa-step-forward nav-btn" id="nextBtn"></i>
        </div>

        <div id="sleep-timer-container" style="margin-top:15px; font-size:0.8rem; color:var(--accent);">
            <span id="sleep-btn" style="cursor:pointer; opacity:0.7;"><i class="fas fa-moon"></i> Sleep Timer</span>
            <div id="sleep-options" style="display:none; margin-top:10px; gap:8px; justify-content:center;">
                <button onclick="setSleepTimer(15)" class="timer-opt">15m</button>
                <button onclick="setSleepTimer(30)" class="timer-opt">30m</button>
                <button onclick="setSleepTimer(60)" class="timer-opt">60m</button>
                <button onclick="setSleepTimer(0)" class="timer-opt" style="color:#ff4444;">Anulează</button>
            </div>
            <div id="timer-display" style="display:none; margin-top:8px;">OPRIRE ÎN: <span id="countdown">00:00</span></div>
        </div>
    </div>

    <div class="scroll-container">
        <div id="favorites-frame" class="list-frame"></div>
        <div id="all-stations-frame" class="list-frame"></div>
    </div>

<script>
    const stations = [
        { id: 1, name: "M Plus-NT 88,6 FM", url: "https://s4.ssl-stream.com:7880/live", logo: "img/logo_radiomplus.webp" },
        { id: 2, name: "Jurnal FM-NT 92 FM", url: "https://ssl.radios.show:7009/stream", logo: "img/logo_jurnal_fm.png" },
        { id: 3, name: "Viva FM-NT 94,7 FM", url: "https://cloud.radiosonicpanel.ro:8008/stream", logo: "img/viva.png" },
        { id: 4, name: "Radio Terra-NT 89,8 FM", url: "https://stream.terrafm.ro/stream", logo: "img/terrafm.png" },
        { id: 5, name: "Europa FM-B", url: "https://astreaming.edi.ro:8443/EuropaFM_aac", logo: "img/europafm.png" },
        { id: 6, name: "Kiss FM-B", url: "https://live.kissfm.ro/kissfm.aacp", logo: "img/kissfm.png" },
        { id: 7, name: "Magic FM-B", url: "https://live.magicfm.ro/magicfm.aacp", logo: "img/magicfm.png" },
        { id: 8, name: "Digi FM-B", url: "https://edge76.rcs-rds.ro/digifm/digifm.mp3", logo: "img/digifm.png" },
        { id: 9, name: "Digi 24FM-B", url: "https://edge76.rcs-rds.ro/digifm/digi24fm.mp3", logo: "img/digi24fm.png" },
        { id: 10, name: "Pro FM-B", url: "https://edge126.rcs-rds.ro/profm/profm.mp3", logo: "img/profm.png" },
        { id: 11, name: "Rock FM-B", url: "https://live.rockfm.ro/rockfm.aacp", logo: "img/rockfm.png" },
        { id: 12, name: "Dance FM-B", url: "https://edge126.rcs-rds.ro/profm/dancefm.mp3", logo: "img/dancefm.png" },
        { id: 13, name: "Subasio-IT", url: "http://icy.unitedradio.it/Subasio.mp3", logo: "img/subasio.png" },
        { id: 14, name: "SubasioPlus-IT", url: "http://icy.unitedradio.it/SubasioPiu.mp3", logo: "img/subasiopiu.png" },
        { id: 15, name: "Country-USA", url: "https://azura.ebsmedia.ro/listen/country/country128.mp3", logo: "img/countryny.png" },
        { id: 16, name: "Country NY -USA", url: "https://stream.revma.ihrhls.com/zc1521", logo: "img/country100_5.png" }
    ];

    let favorites = JSON.parse(localStorage.getItem('radioFavs')) || [];
    let currentAudio = new Audio();
    let currentIndex = 0;
    let sleepTimeout, countdownInterval, metadataInterval;

    const masterPlay = document.getElementById('masterPlay');
    const nowPlaying = document.getElementById('now-playing');
    const logoContainer = document.getElementById('logo-container');

    function setStatus(type) {
        const box = document.getElementById('radio-status-box');
        const txt = document.getElementById('status-text');
        box.className = 'status-container';
        logoContainer.classList.remove('playing-animation');
        if (type === 'online') {
            box.classList.add('status-online'); txt.innerText = 'Online';
            logoContainer.classList.add('playing-animation');
        } else if (type === 'offline') {
            box.classList.add('status-offline'); txt.innerText = 'Offline';
        } else {
            box.classList.add('status-loading'); txt.innerText = 'Se încarcă...';
        }
    }

    // Media Session pentru control nativ Android
    function updateMediaSession(s) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: s.name,
                artist: 's.name',
                artwork: [{ src: s.logo, sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => { currentAudio.play(); masterPlay.className="fas fa-pause-circle play-btn"; });
            navigator.mediaSession.setActionHandler('pause', () => { currentAudio.pause(); masterPlay.className="fas fa-play-circle play-btn"; });
            navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('prevBtn').click());
            navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('nextBtn').click());
        }
    }

    async function fetchMetadata(url) {
        try {
            if(url.includes("edi.ro")) {
                const response = await fetch('https://www.europafm.ro/wp-content/themes/europafm/api/live.php');
                const data = await response.json();
                nowPlaying.innerText = data.artist + " - " + data.title;
            } else {
                nowPlaying.innerText = "Audio Live Streaming";
            }
        } catch (e) {
            nowPlaying.innerText = "Radio Streaming";
        }
    }

    currentAudio.addEventListener('playing', () => {
        setStatus('online');
        clearInterval(metadataInterval);
        metadataInterval = setInterval(() => fetchMetadata(currentAudio.src), 20000);
        fetchMetadata(currentAudio.src);
    });

    currentAudio.addEventListener('pause', () => clearInterval(metadataInterval));
    currentAudio.addEventListener('error', () => setStatus('offline'));

    function playByIndex(index) {
        currentIndex = index;
        const s = stations[currentIndex];
        setStatus('loading');
        currentAudio.src = s.url;
        currentAudio.play();
        document.getElementById('current-title').innerText = s.name;
        document.getElementById('current-logo').src = s.logo;
        masterPlay.className = "fas fa-pause-circle play-btn";
        updateMediaSession(s);
        renderLists();
    }

    function renderLists() {
        const fF = document.getElementById('favorites-frame');
        const aF = document.getElementById('all-stations-frame');
        fF.innerHTML = ''; aF.innerHTML = '';
        let hasF = false;
        stations.forEach((s, i) => {
            const isF = favorites.includes(s.id);
            const html = `<div class="radio-item ${currentIndex === i ? 'active' : ''}" onclick="playByIndex(${i})">
                <img src="${s.logo}">
                <div class="info"><strong>${s.name}</strong></div>
                <i class="fas fa-star fav-star ${isF ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav(${s.id})"></i>
            </div>`;
            if (isF) { fF.insertAdjacentHTML('beforeend', html); hasF = true; }
            else aF.insertAdjacentHTML('beforeend', html);
        });
        fF.style.display = hasF ? 'block' : 'none';
    }

    function toggleFav(id) {
        favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
        localStorage.setItem('radioFavs', JSON.stringify(favorites));
        renderLists();
    }

    document.getElementById('sleep-btn').onclick = () => {
        const opt = document.getElementById('sleep-options');
        opt.style.display = opt.style.display === 'none' ? 'flex' : 'none';
    };

    function setSleepTimer(min) {
        clearTimeout(sleepTimeout); clearInterval(countdownInterval);
        const disp = document.getElementById('timer-display');
        if (min === 0) { disp.style.display = 'none'; return; }
        disp.style.display = 'block';
        let sec = min * 60;
        countdownInterval = setInterval(() => {
            sec--;
            const m = Math.floor(sec/60), s = sec%60;
            document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (sec <= 0) clearInterval(countdownInterval);
        }, 1000);
        sleepTimeout = setTimeout(() => { 
            currentAudio.pause(); 
            setStatus('offline'); 
            masterPlay.className="fas fa-play-circle play-btn"; 
            disp.style.display='none'; 
        }, min * 60000);
        document.getElementById('sleep-options').style.display = 'none';
    }

    masterPlay.onclick = () => {
        if (!currentAudio.src) return playByIndex(0);
        currentAudio.paused ? (currentAudio.play(), masterPlay.className="fas fa-pause-circle play-btn") : (currentAudio.pause(), masterPlay.className="fas fa-play-circle play-btn");
    };

    document.getElementById('nextBtn').onclick = () => playByIndex((currentIndex + 1) % stations.length);
    document.getElementById('prevBtn').onclick = () => playByIndex((currentIndex - 1 + stations.length) % stations.length);

    renderLists();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
